AWSTemplateFormatVersion: '2010-09-09'
# NOTE: This stack must be deployed in us-east-1 — ACM certificates used by CloudFront must be in that region.
# After deployment, add the output NameServers as NS records in CloudFlare to delegate DNS for DomainName to Route 53.
# CloudFormation will wait for ACM certificate validation, so add the NS records in CloudFlare as soon as the
# Route 53 hosted zone is created (visible in the AWS Console while the stack is still deploying).
Description: S3 bucket with CloudFront distribution, Route53 hosted zone, and ACM certificate for secure image serving

Parameters:
  BucketName:
    Type: String
    Description: Globally unique S3 bucket name for storing images
    AllowedPattern: '^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$'
    ConstraintDescription: Bucket name must be between 3-63 characters, lowercase, numbers, and hyphens
  DomainName:
    Type: String
    Description: Custom domain name for CloudFront (e.g., images.example.com)
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
    ConstraintDescription: Domain name must be a valid domain

Resources:
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName

  AcmCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZone

  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  ImageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${CloudFrontOAI}'
            Action: 's3:GetObject'
            Resource: !Sub '${ImageBucket.Arn}/*'

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub 'OAI for ${BucketName}'

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'CloudFront distribution for ${DomainName}'
        Aliases:
          - !Ref DomainName
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        Origins:
          - DomainName: !GetAtt ImageBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'

  Route53Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        EvaluateTargetHealth: false

Outputs:
  NameServers:
    Description: Route 53 name servers — add these as NS records in CloudFlare to delegate DNS for this domain
    Value: !Join
      - ', '
      - !GetAtt HostedZone.NameServers
  BucketName:
    Description: S3 Bucket Name
    Value: !Ref ImageBucket
  CloudFrontURL:
    Description: CloudFront Distribution URL (default)
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  CustomDomainURL:
    Description: Custom Domain URL
    Value: !Sub 'https://${DomainName}'
  DistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution
